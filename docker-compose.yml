version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: urbania-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: urbania
      POSTGRES_PASSWORD: urbania
      POSTGRES_DB: urbania
    ports:
      - "5434:5432"
    volumes:
      - urbania_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbania"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urbania-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - urbania_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: urbania-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mailpit:
    image: axllent/mailpit:latest
    container_name: urbania-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "ready"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  urbania_postgres_data:
  urbania_redis_data:
